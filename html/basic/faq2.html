<!DOCTYPE html>
<!-- コメントはファイルとして認識されない -->
<!-- lang属性は、htmlタグ以外のところでも使うことができるので、グローバル属性になる。 -->
<html lang="ja">
  <head>
    <!-- metaは「各種設定」の意味で、charsetは「文字コード」の意味 -->
    <!-- charsetという属性は、metaというタグにだけ付けることができて、必ずセットで使われる。 -->
    <!-- metaタグは終了タグがない「空要素」になる。 -->
    <meta charset="UTF-8">
    <title>よくあるご質問</title>

    <!-- rel属性は「Relationship」の略だが、あまりここは意識しなくても良い。 -->
    <!-- CSSを使う時には、rel属性というのを必ず「stylesheet」にする。 -->
    <!-- linkタグは他の用途にも使われたりするので、ここでは「CSSで使いますよ」という意味で、rel属性を「stylesheet」にしている。 -->
    <!-- href属性は、「hypertext reference」の略で、あまりこれも意識しなくても良い。 -->
    <!-- href属性は、「ファイル名（具体的にはファイルパス、そのファイルの場所）」を示してあげる。 -->
    <!-- こうすると、「CSSのファイルとHTMLのファイルが合体」して、これで参照して使えるようになる。 -->
    <!-- ノーマライズのlinkタグは、必ず「normalize2.css」が前に来るようにしてあげる -->
    <link rel="stylesheet" href="css/style2.css">
  </head>
  <body>
    <!-- 「header」のような、特に見た目とか意味合いとかに影響しないようなタグのことを「区分コンテンツ」だったり、「セクショニングコンテンツ」と呼ばれたりする -->
    <header>
      <p>ともすた</p>
    </header>
    <main>
      <h1>よくあるご質問</h1>
      <p>よくあるご質問に回答いたします</p>
      <h2>一般的な質問</h2>
      <h3>会員の種類を教えてください</h3>
      <p>会員の種類には次のものがあります</p>
      <ul>
        <li>一般会員</li>
        <li>プレミアム会員</li>
      </ul>
      <h2>技術的な質問</h2>
    </main>
    <footer>
      <!-- 著作権表記 -->
      <p>&copy; 2026 Tomosta</p>
    </footer>
  </body>
</html>
