<!DOCTYPE html>
<!-- lang属性は、htmlタグ以外のところでも使うことができるので、グローバル属性になる。 -->
<html lang="ja">
  <head>
    <!-- metaは「各種設定」の意味で、charsetは「文字コード」の意味 -->
    <!-- charsetという属性は、metaというタグにだけ付けることができて、必ずセットで使われる。 -->
    <meta charset="UTF-8"> 
    <title>よくあるご質問</title>
  </head>
  <body>
    <h1>よくあるご質問</h1>
    <p>よくあるご質問に回答いたします</p>
    <h2>一般的な質問</h2>
    <h3>会員の種類を教えてください</h3>
    <p>会員の種類には次のものがあります</p>
    <ul>
      <li>一般会員</li>
      <li>プレミアム会員</li>
    </ul>
    <h2>技術的な質問</h2>
  </body>
</html>
