<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" />
    <title>CSSの詳細度</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
      }
      div[class="box box-primary"] {
        background-color: #0ff !important;
      }
      .box.box-primary {
        background-color: #00f;
      }
      div {
        background-color: #0f0 !important; /*緑色の方が要素セレクタしか使っていないので、詳細度としては青色よりも低い。*/
      }

    </style>
  </head>
  <body>
    <div id="box1" class="box box-primary"></div>
  </body>
</html>
